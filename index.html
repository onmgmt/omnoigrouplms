<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omnoi Academy — ระบบเรียนรู้ภายในองค์กร</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#003149;--blue:#6a9dbd;--maroon:#7a1315;--red:#ed1c24;--cream:#fff0d8;--ink:#0b2433;
  --line:#dfe7ec;--ok:#1f8a4c;--warn:#c9851a;
  --shadow:0 10px 30px rgba(0,49,73,.10);--shadow-lg:0 18px 50px rgba(0,49,73,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Sarabun',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--ink);background:var(--cream);-webkit-font-smoothing:antialiased}
h1,h2,h3,h4,h5,.font-head,.btn,.brand-name{font-family:'Prompt',sans-serif}
a{color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}
img{max-width:100%;display:block}
.hidden{display:none !important}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;border-radius:12px;font-weight:600;font-size:15px;background:var(--red);color:#fff;transition:.15s;white-space:nowrap}
.btn:hover{filter:brightness(.94);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;filter:none}
.btn.navy{background:var(--navy)}
.btn.ghost{background:transparent;color:var(--navy);border:1.5px solid var(--line)}
.btn.ghost:hover{border-color:var(--navy);filter:none}
.btn.blue{background:var(--blue);color:var(--navy)}
.btn.sm{padding:7px 14px;font-size:13px;border-radius:9px}
.btn.block{width:100%}
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at 15% 20%,rgba(106,157,189,.35),transparent 45%),radial-gradient(circle at 85% 80%,rgba(237,28,36,.18),transparent 40%),var(--navy)}
.login-card{width:100%;max-width:880px;background:#fff;border-radius:24px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;box-shadow:var(--shadow-lg)}
.login-art{background:linear-gradient(160deg,var(--navy),#012537);color:var(--cream);padding:40px 36px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.login-art .blob{position:absolute;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(106,157,189,.4),transparent 70%);bottom:-120px;right:-100px}
.login-art img{width:170px;margin:18px auto;filter:drop-shadow(0 12px 22px rgba(0,0,0,.35));position:relative}
.login-art h2{font-size:26px;line-height:1.25;font-weight:800;position:relative}
.login-art p{opacity:.85;margin-top:8px;font-size:14px;position:relative}
.login-form{padding:44px 40px;display:flex;flex-direction:column;justify-content:center}
.login-form .brand-name{color:var(--maroon);font-weight:800;letter-spacing:.5px;font-size:14px}
.login-form h1{font-size:28px;color:var(--navy);margin:4px 0 26px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--navy);margin-bottom:6px}
.field input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;font-size:15px;font-family:inherit;background:#fbfcfd;transition:.15s}
.field input:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(106,157,189,.2)}
.login-err{color:var(--red);font-size:13.5px;margin:-4px 0 12px;min-height:18px;font-weight:500}
.demo-accts{margin-top:22px;border-top:1px dashed var(--line);padding-top:16px}
.demo-accts p{font-size:12px;color:#6b7d88;margin-bottom:8px;font-weight:600}
.demo-chip{display:inline-flex;flex-direction:column;gap:1px;border:1px solid var(--line);border-radius:9px;padding:7px 11px;font-size:12px;margin:0 6px 6px 0;cursor:pointer;background:#fbfcfd;transition:.15s;line-height:1.3}
.demo-chip:hover{border-color:var(--blue);background:#fff}
.demo-chip b{font-family:'Prompt';color:var(--navy)}
.demo-chip span{color:#8a99a2}
#app{min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--navy);color:#fff;display:flex;align-items:center;gap:14px;padding:0 22px;height:64px;position:sticky;top:0;z-index:30;box-shadow:0 2px 14px rgba(0,0,0,.18)}
.topbar img.logo{height:42px}
.topbar .brand-name{font-weight:800;font-size:18px;letter-spacing:.3px}
.topbar .brand-name small{display:block;font-size:10px;font-weight:400;opacity:.7;letter-spacing:2px;font-family:'Sarabun'}
.topbar .spacer{flex:1}
.topbar .user-box{display:flex;align-items:center;gap:10px;font-size:14px}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--blue);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Prompt';font-size:16px}
.user-box .meta{line-height:1.25}
.user-box .meta b{font-weight:600}
.user-box .meta span{font-size:11.5px;opacity:.75;display:block}
.role-pill{font-size:10px;background:var(--red);padding:2px 8px;border-radius:20px;font-weight:600;font-family:'Prompt'}
.role-pill.admin{background:var(--maroon)}
main{flex:1;width:100%;max-width:1160px;margin:0 auto;padding:30px 24px 60px}
.page-head{margin-bottom:24px}
.page-head .crumb{font-size:13px;color:#7c8b94;margin-bottom:6px;cursor:pointer}
.page-head .crumb:hover{color:var(--red)}
.page-head h1{font-size:30px;color:var(--navy);font-weight:800}
.page-head p{color:#5b6c75;margin-top:5px}
.grid{display:grid;gap:20px}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-2{grid-template-columns:repeat(2,1fr)}
.cols-4{grid-template-columns:repeat(4,1fr)}
.card{background:#fff;border-radius:18px;box-shadow:var(--shadow);overflow:hidden;transition:.18s;border:1px solid #eef2f5}
.card.hover:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.course-thumb{height:128px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.course-thumb .icon{font-size:46px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.2))}
.course-thumb .tag{position:absolute;top:10px;left:10px;background:rgba(255,255,255,.92);color:var(--navy);font-size:11px;font-weight:700;font-family:'Prompt';padding:3px 10px;border-radius:20px}
.course-thumb .lessons-n{position:absolute;bottom:10px;right:10px;background:rgba(0,49,73,.78);color:#fff;font-size:11px;padding:3px 9px;border-radius:8px;font-weight:500}
.course-body{padding:16px 18px 18px}
.course-body h3{font-size:17px;color:var(--navy);font-weight:700;line-height:1.3;margin-bottom:6px}
.course-body .desc{font-size:13px;color:#6b7d88;line-height:1.5;min-height:38px}
.progress{height:8px;background:#eef2f5;border-radius:20px;overflow:hidden;margin:14px 0 6px}
.progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--navy));border-radius:20px;transition:width .4s}
.progress.done > i{background:linear-gradient(90deg,#34c46b,var(--ok))}
.course-body .prow{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#7c8b94}
.badge{font-size:11px;font-weight:700;font-family:'Prompt';padding:3px 10px;border-radius:20px}
.badge.done{background:#e3f6ea;color:var(--ok)}
.badge.prog{background:#eaf3f9;color:var(--navy)}
.badge.new{background:#fdecec;color:var(--red)}
.badge.fail{background:#fdecec;color:var(--red)}
.stat{background:#fff;border-radius:16px;padding:18px 20px;box-shadow:var(--shadow);border:1px solid #eef2f5}
.stat .lab{font-size:13px;color:#7c8b94;font-weight:600}
.stat .num{font-size:32px;font-weight:800;font-family:'Prompt';color:var(--navy);margin-top:2px}
.stat .num small{font-size:15px;color:#9aa8b0;font-weight:500}
.stat.accent{background:var(--navy);color:#fff}
.stat.accent .lab{color:rgba(255,255,255,.75)}
.stat.accent .num{color:#fff}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
.tab{padding:8px 16px;border-radius:30px;font-size:14px;font-weight:600;font-family:'Prompt';background:#fff;color:var(--navy);border:1.5px solid var(--line);transition:.15s}
.tab:hover{border-color:var(--blue)}
.tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.detail-grid{display:grid;grid-template-columns:1fr 340px;gap:26px;align-items:start}
.lesson-list{background:#fff;border-radius:16px;box-shadow:var(--shadow);overflow:hidden;border:1px solid #eef2f5}
.lesson-list .lh{padding:16px 18px;border-bottom:1px solid var(--line);font-family:'Prompt';font-weight:700;color:var(--navy)}
.lesson{display:flex;align-items:center;gap:13px;padding:14px 18px;border-bottom:1px solid #f2f5f7;transition:.12s}
.lesson:last-child{border-bottom:none}
.lesson.clickable{cursor:pointer}
.lesson.clickable:hover{background:#f7fafb}
.lesson.locked{opacity:.55;cursor:not-allowed}
.l-num{width:32px;height:32px;border-radius:50%;background:#eef2f5;color:var(--navy);flex:none;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Prompt';font-size:14px}
.lesson.done .l-num{background:var(--ok);color:#fff}
.lesson.current .l-num{background:var(--red);color:#fff}
.l-info{flex:1;min-width:0}
.l-info .t{font-weight:600;font-size:14.5px;color:var(--navy)}
.l-info .m{font-size:12px;color:#8a99a2;margin-top:1px}
.l-state{font-size:18px;flex:none}
.player-wrap{background:#fff;border-radius:16px;box-shadow:var(--shadow);overflow:hidden;border:1px solid #eef2f5}
.vid-frame{position:relative;aspect-ratio:16/9;background:#000;overflow:hidden}
.vid-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.novideo{position:relative;aspect-ratio:16/9;background:radial-gradient(circle at 50% 40%,#073a55,#001824);display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;text-align:center;padding:20px}
.novideo .mascot-still{width:110px;opacity:.9;margin-bottom:14px}
.novideo .vtitle{position:absolute;top:16px;left:18px;color:#fff;font-family:'Prompt';font-weight:600;font-size:15px;text-shadow:0 2px 8px rgba(0,0,0,.5);max-width:70%}
.novideo .msg{color:#fff;opacity:.85;font-size:14px;line-height:1.6}
.finished-ov{position:absolute;inset:0;background:rgba(0,24,36,.88);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:8;text-align:center;padding:20px}
.finished-ov .big{font-size:54px}
.finished-ov h3{font-size:22px}
.controls{padding:14px 18px;background:#fff}
.speed-note{font-size:12px;color:#9aa8b0;margin-top:10px;text-align:center}
.sidebox{background:#fff;border-radius:16px;box-shadow:var(--shadow);padding:20px;border:1px solid #eef2f5}
.sidebox h4{font-family:'Prompt';color:var(--navy);font-size:16px;margin-bottom:10px}
.sidebox .meta-row{display:flex;justify-content:space-between;font-size:13.5px;padding:7px 0;border-bottom:1px solid #f2f5f7}
.sidebox .meta-row:last-of-type{border-bottom:none}
.sidebox .meta-row span:first-child{color:#7c8b94}
.sidebox .meta-row span:last-child{font-weight:600;color:var(--navy)}
.quiz-card{background:#fff;border-radius:18px;box-shadow:var(--shadow);max-width:760px;margin:0 auto;overflow:hidden;border:1px solid #eef2f5}
.quiz-head{background:var(--navy);color:#fff;padding:22px 26px}
.quiz-head h2{font-size:21px}
.quiz-head p{opacity:.8;font-size:13.5px;margin-top:3px}
.quiz-body{padding:26px}
.q{margin-bottom:24px}
.q .qn{font-weight:700;color:var(--navy);font-size:16px;margin-bottom:12px;font-family:'Prompt'}
.q .qn b{color:var(--red);margin-right:6px}
.opt{display:flex;align-items:center;gap:12px;padding:13px 16px;border:1.5px solid var(--line);border-radius:12px;margin-bottom:10px;cursor:pointer;transition:.12s;font-size:15px}
.opt:hover{border-color:var(--blue);background:#f7fafb}
.opt.sel{border-color:var(--navy);background:#eaf3f9}
.opt .mk{width:24px;height:24px;border-radius:50%;border:2px solid #c4d2da;flex:none;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff}
.opt.sel .mk{background:var(--navy);border-color:var(--navy)}
.opt.correct{border-color:var(--ok);background:#e9f7ef}
.opt.correct .mk{background:var(--ok);border-color:var(--ok)}
.opt.wrong{border-color:var(--red);background:#fdecec}
.opt.wrong .mk{background:var(--red);border-color:var(--red)}
.quiz-foot{padding:18px 26px;border-top:1px solid var(--line);display:flex;align-items:center;gap:14px}
.quiz-foot .pct{margin-right:auto;font-size:13px;color:#7c8b94}
.result-card{max-width:560px;margin:0 auto;background:#fff;border-radius:20px;box-shadow:var(--shadow-lg);text-align:center;padding:42px 36px;border:1px solid #eef2f5}
.result-ring{width:150px;height:150px;margin:0 auto 20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Prompt';position:relative}
.result-ring .inner{width:118px;height:118px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center}
.result-ring .inner b{font-size:40px;color:var(--navy);line-height:1}
.result-ring .inner span{font-size:12px;color:#8a99a2}
.result-card h2{font-size:24px;color:var(--navy)}
.result-card .sub{color:#6b7d88;margin:8px 0 24px}
.result-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.table-wrap{background:#fff;border-radius:16px;box-shadow:var(--shadow);overflow:hidden;border:1px solid #eef2f5}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:13px 18px;font-size:14px}
th{background:#f5f8fa;color:var(--navy);font-family:'Prompt';font-weight:600;font-size:13px;border-bottom:2px solid var(--line);position:sticky;top:64px}
td{border-bottom:1px solid #f2f5f7;color:#3b4a52}
tr:hover td{background:#fafcfd}
td .who{display:flex;align-items:center;gap:10px}
td .who .avatar{width:32px;height:32px;font-size:13px}
.score-pill{font-weight:700;font-family:'Prompt';font-size:13px;padding:3px 11px;border-radius:20px;display:inline-block}
.s-pass{background:#e3f6ea;color:var(--ok)}.s-fail{background:#fdecec;color:var(--red)}.s-none{background:#eef2f5;color:#9aa8b0}
.panel{background:#fff;border-radius:16px;box-shadow:var(--shadow);padding:26px;border:1px solid #eef2f5}
.panel h3{font-family:'Prompt';color:var(--navy);font-size:18px;margin-bottom:4px}
.panel .sub{color:#7c8b94;font-size:13.5px;margin-bottom:20px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-row.one{grid-template-columns:1fr}
.input{width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:11px;font-size:14.5px;font-family:inherit;background:#fbfcfd}
.input:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(106,157,189,.18)}
label.lab{display:block;font-size:13px;font-weight:600;color:var(--navy);margin-bottom:6px}
.lesson-row{border:1px solid var(--line);border-radius:12px;padding:10px 12px 12px;margin-bottom:8px}
.lesson-row .row1{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.lesson-row .row1 .input{flex:1}
.lesson-row .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.lesson-row .ln{width:26px;height:26px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Prompt';font-weight:700;font-size:12px;flex:none}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--navy);color:#fff;padding:14px 24px;border-radius:14px;box-shadow:var(--shadow-lg);font-weight:600;z-index:100;transition:.35s;display:flex;align-items:center;gap:10px}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--ok)}
.help-box{background:#f1f7fb;border:1px solid #d6e6f0;border-radius:12px;padding:14px 16px;font-size:13px;color:#3b5a6e;margin-bottom:16px;line-height:1.6}
.help-box b{color:var(--navy)}
.up-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;margin-bottom:8px}
.up-item .ic{font-size:22px}
.up-item .t{flex:1;font-size:14px;font-weight:600;color:var(--navy)}
.up-item .t small{display:block;font-weight:400;color:#9aa8b0;font-size:12px}
.vid-tag{font-size:10px;font-weight:700;font-family:'Prompt';padding:2px 7px;border-radius:6px}
.vid-on{background:#e3f6ea;color:var(--ok)}
.vid-off{background:#eef2f5;color:#9aa8b0}
.badge.locked{background:#eef2f5;color:#9aa8b0}
.badge.draft{background:#fff3cd;color:#8a6d1a}
.up-item{flex-wrap:wrap}
.up-item .actions{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
.chk-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.chk-item{display:flex;align-items:center;gap:7px;border:1.5px solid var(--line);border-radius:10px;padding:8px 12px;font-size:13.5px;cursor:pointer;transition:.12s}
.chk-item input{width:16px;height:16px;accent-color:var(--navy)}
.chk-item.on{border-color:var(--navy);background:#eaf3f9}
.pw-box{background:#fff8e6;border:1.5px solid #f0d382;border-radius:12px;padding:14px 16px;margin-bottom:20px;font-size:13.5px;color:#6b5116;line-height:1.7}
.pw-box code{background:#fff;padding:2px 8px;border-radius:6px;border:1px solid #f0d382;font-weight:700;color:#4a3a0f}
@media(max-width:900px){.login-card{grid-template-columns:1fr}.login-art{display:none}.detail-grid{grid-template-columns:1fr}.cols-3,.cols-4{grid-template-columns:1fr 1fr}.cols-2{grid-template-columns:1fr}}
@media(max-width:560px){.cols-3,.cols-4,.cols-2{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}.lesson-row .row2{grid-template-columns:1fr}main{padding:20px 16px 50px}.user-box .meta{display:none}}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<section id="login">
  <div class="login-card">
    <div class="login-art">
      <div class="blob"></div>
      <div><h2>เรียนรู้ เติบโต<br>ไปด้วยกัน</h2>
        <p>ระบบพัฒนาทักษะพนักงาน Omnoi Group ทุกสายงาน เรียนได้ทุกที่ทุกเวลา</p></div>
      <img src="logo.png" alt="Omnoi mascot">
      <p style="font-size:12px;opacity:.6">Omnoi Group · Internal Learning Platform 2026</p>
    </div>
    <div class="login-form">
      <div class="brand-name">OMNOI ACADEMY</div>
      <h1>เข้าสู่ระบบ</h1>
      <form id="loginForm" autocomplete="off">
        <div class="field"><label>ชื่อผู้ใช้ (Username)</label><input type="text" id="luser" placeholder="เช่น somchai" required></div>
        <div class="field"><label>รหัสผ่าน (Password)</label><input type="password" id="lpass" placeholder="••••••" required></div>
        <div class="login-err" id="lerr"></div>
        <button class="btn block" type="submit">เข้าสู่ระบบ</button>
      </form>
    </div>
  </div>
</section>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <header class="topbar">
    <img src="logo.png" class="logo" alt="logo">
    <div class="brand-name">OMNOI ACADEMY<small>LEARNING SYSTEM</small></div>
    <div class="spacer"></div>
    <nav id="navLinks" style="display:flex;gap:6px"></nav>
    <div class="user-box">
      <div class="meta" style="text-align:right"><b id="ubName"></b><span id="ubTrack"></span></div>
      <div class="avatar" id="ubAvatar"></div>
      <span class="role-pill" id="ubRole"></span>
      <button class="btn ghost sm" style="color:#fff;border-color:rgba(255,255,255,.3)" onclick="logout()">ออก</button>
    </div>
  </header>
  <main id="view"></main>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   Omnoi Academy LMS — Frontend (PHP + MySQL backend)
   - ผู้ใช้/แผนก/คอร์ส/บทเรียน/คะแนน/ล็อก เก็บใน MySQL ผ่าน api/*.php ทั้งหมด

const PASS_MARK = 80;

/* ---------- esc: กัน stored XSS ก่อน render ข้อความที่แอดมิน/ผู้ใช้กรอกด้วย innerHTML ---------- */
function esc(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- api(): fetch wrapper พร้อม CSRF header + จัดการ error ให้เป็น Error(message,status) ---------- */
async function api(path, opts = {}) {
  const o = { method: 'GET', credentials: 'same-origin', headers: {}, ...opts };
  if (o.body && typeof o.body !== 'string') {
    o.headers = { ...o.headers, 'Content-Type': 'application/json' };
    o.body = JSON.stringify(o.body);
  }
  if (o.method !== 'GET' && CSRF) o.headers = { ...o.headers, 'X-CSRF-Token': CSRF };
  const res = await fetch('api/' + path, o);
  let data = null;
  try { data = await res.json(); } catch (e) {}
  if (!res.ok) {
    const err = new Error((data && data.error) || ('เกิดข้อผิดพลาด (' + res.status + ')'));
    err.status = res.status;
    err.data = data;
    throw err;
  }
  return data;
}

/* ---------- Redirect: สัญญาณให้ router go() ทำการนำทางแทน แทนการเรียก go() ซ้อนภายใน view function ---------- */
class Redirect {
  constructor(screen, opt = {}) { this.screen = screen; this.opt = opt; }
}

/* Google Drive embed/download src (ต้องแชร์ไฟล์เป็น "ทุกคนที่มีลิงก์ - ดูได้" ก่อน) */
function driveEmbedSrc(id){ return `https://drive.google.com/file/d/${id}/preview`; }
function driveDownloadSrc(id){ return `https://drive.google.com/uc?export=download&id=${id}`; }

/* ---------- Router ---------- */
let __navToken = 0;
async function go(screen, opt = {}){
  const myToken = ++__navToken;
  nav = { screen, ...opt };
  const v = document.getElementById('view');
  window.scrollTo(0, 0);
  markNav(screen);
  v.innerHTML = '<div style="padding:60px;text-align:center;color:#9aa8b0">กำลังโหลด…</div>';
  try {
    let html = '';
    if (screen === 'dash') html = await viewDash();
    else if (screen === 'myscore') html = await viewMyScore();
    else if (screen === 'course') html = await viewCourse(opt.courseId);
    else if (screen === 'player') html = await viewPlayer(opt.courseId, opt.lessonId);
    else if (screen === 'quiz') html = await viewQuiz(opt.courseId);
    else if (screen === 'result') html = viewResult(opt.courseId);
    else if (screen === 'admin') html = await viewAdmin();
    else if (screen === 'report') html = await viewReport();
    else if (screen === 'manage') html = await viewManage();
    else if (screen === 'quizedit') html = await viewQuizEdit(opt.courseId);
    else if (screen === 'depts') html = await viewDepts();
    else if (screen === 'users') html = await viewUsers();
    else if (screen === 'logs') html = await viewLogs();
    if (myToken !== __navToken) return; // ถูกแทนที่ด้วยการนำทางใหม่กว่าแล้ว
    v.innerHTML = html;
    if (screen === 'manage') renderLessonRows();
    else if (screen === 'quizedit') renderQuizQuestions();
  } catch (e) {
    if (myToken !== __navToken) return;
    if (e instanceof Redirect) { go(e.screen, e.opt); return; }
    if (e.status === 401) { toast('เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่'); resetToLogin(); return; }
    v.innerHTML = `<div class="page-head"><h1>เกิดข้อผิดพลาด</h1><p>${esc(e.message || 'ไม่ทราบสาเหตุ')}</p></div>`;
    toast(e.message || 'เกิดข้อผิดพลาด');
  }
}

/* ---------- helpers ---------- */
function toast(msg, ok = false){
  const t = document.getElementById('toast');
  t.innerHTML = (ok ? '✓ ' : '') + esc(msg);
  t.className = 'toast show' + (ok ? ' ok' : '');
  setTimeout(() => t.className = 'toast', 2600);
}
function shade(hex, p){
  const n = parseInt(hex.slice(1), 16);
  let r = (n >> 16) + Math.round(255 * p / 100), g = ((n >> 8) & 255) + Math.round(255 * p / 100), b = (n & 255) + Math.round(255 * p / 100);
  r = Math.max(0, Math.min(255, r)); g = Math.max(0, Math.min(255, g)); b = Math.max(0, Math.min(255, b));
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}

/* ---------- Dashboard (พนักงาน) ---------- */
async function viewDash(){
  const [{ departments }, { courses }] = await Promise.all([api('departments_list.php'), api('courses_list.php')]);
  const total = courses.length;
  const done = courses.filter(c => c.completed).length;
  const inprog = courses.filter(c => !c.completed && !c.locked && (c.lesson_watched > 0 || c.attempts > 0)).length;
  const scored = courses.filter(c => c.best_score !== null).map(c => c.best_score);
  const avg = scored.length ? Math.round(scored.reduce((a,b) => a+b, 0) / scored.length) : '—';
  const deptNames = departments.map(d => `${d.icon} ${d.name}`).join(' · ') || '—';
  const byDept = {};
  courses.forEach(c => { (byDept[c.department_id] ||= []).push(c); });
  const sections = departments.map(d => {
    const cs = byDept[d.id] || [];
    if (!cs.length) return '';
    return `<div style="margin:26px 0 14px"><h2 style="font-size:18px;color:var(--navy);font-family:'Prompt'">${d.icon} ${esc(d.name)}</h2></div>
      <div class="grid cols-3">${cs.map(courseCard).join('')}</div>`;
  }).join('') || '<p style="color:#9aa8b0">ยังไม่มีหลักสูตรในแผนกของคุณ ติดต่อแอดมินเพื่อกำหนดแผนก</p>';
  return `<div class="page-head"><h1>สวัสดี, ${esc(CURRENT.full_name.split(' ')[0])} 👋</h1>
    <p>สังกัดแผนก <b style="color:var(--navy)">${esc(deptNames)}</b> — ดูวิดีโอให้จบแล้วทำแบบทดสอบเพื่อรับคะแนน</p></div>
    <div class="grid cols-4" style="margin-bottom:10px">
      <div class="stat accent"><div class="lab">หลักสูตรทั้งหมด</div><div class="num">${total}</div></div>
      <div class="stat"><div class="lab">เรียนจบแล้ว</div><div class="num">${done}<small> / ${total}</small></div></div>
      <div class="stat"><div class="lab">กำลังเรียน</div><div class="num">${inprog}</div></div>
      <div class="stat"><div class="lab">คะแนนเฉลี่ย</div><div class="num">${avg}<small>${avg === '—' ? '' : ' %'}</small></div></div>
    </div>${sections}`;
}
function courseCard(c){
  const pct = c.progress_pct;
  let badge;
  if (c.locked) badge = `<span class="badge locked">🔒 ล็อก (level ${c.level})</span>`;
  else if (c.completed) badge = `<span class="badge done">✓ ผ่าน ${c.best_score}%</span>`;
  else if (c.best_score !== null) badge = `<span class="badge fail">ไม่ผ่าน ${c.best_score}%</span>`;
  else if (c.lesson_watched > 0) badge = `<span class="badge prog">กำลังเรียน</span>`;
  else badge = `<span class="badge new">ใหม่</span>`;
  const click = c.locked
    ? `onclick="toast('คอร์สนี้ยังไม่ปลดล็อก ต้องผ่าน Level ${c.level - 1} ในแผนกเดียวกันก่อน')"`
    : `onclick="go('course',{courseId:${c.id}})"`;
  return `<div class="card hover" ${click} style="cursor:pointer;${c.locked ? 'opacity:.7' : ''}">
    <div class="course-thumb" style="background:linear-gradient(135deg,${c.color},${shade(c.color,-25)})">
      <span class="tag">Lv.${c.level} · ${esc(c.department_name || '')}</span><span class="icon">${c.locked ? '🔒' : c.icon}</span>
      <span class="lessons-n">▶ ${c.lesson_total} บท</span></div>
    <div class="course-body"><h3>${esc(c.title)}</h3><div class="desc">${esc(c.description || '')}</div>
      <div class="progress ${pct === 100 ? 'done' : ''}"><i style="width:${pct}%"></i></div>
      <div class="prow"><span>เรียนแล้ว ${pct}%</span>${badge}</div></div></div>`;
}

/* ---------- Course detail ---------- */
async function viewCourse(cid){
  const { course: c, lessons, quiz_count, best_score, attempts, last_date } = await api('course_detail.php?id=' + cid);
  const watchedAll = lessons.length > 0 && lessons.every(l => l.watched);
  const lockedBanner = c.locked
    ? `<div class="help-box" style="border-color:#f0b8b8;background:#fdecec;color:var(--maroon)">🔒 คอร์สนี้ยังไม่ปลดล็อก — ต้องเรียนและผ่านคอร์ส Level ${c.level - 1} ในแผนก ${esc(c.department_name)} ให้ผ่านเกณฑ์ก่อน</div>`
    : '';
  const lessonsHtml = lessons.map((l, i) => {
    const done = l.watched, prevDone = i === 0 || lessons[i-1].watched, unlocked = !c.locked && (done || prevDone);
    const cls = done ? 'done' : (prevDone && !done && !c.locked ? 'current' : 'locked');
    const click = unlocked ? `onclick="go('player',{courseId:${cid},lessonId:${l.id}})"` : '';
    const state = done ? '✓' : (unlocked ? '▶' : '🔒');
    const src = l.drive_video_id ? '<span class="vid-tag vid-on">Google Drive</span>' : '<span class="vid-tag vid-off">ยังไม่มีวิดีโอ</span>';
    const docLink = (done && l.drive_doc_id) ? ` <a href="#" onclick="event.stopPropagation();event.preventDefault();downloadDoc(${l.id},'${l.drive_doc_id}')" class="vid-tag vid-on" style="text-decoration:none">📄 เอกสาร</a>` : '';
    return `<div class="lesson ${cls} ${unlocked ? 'clickable' : 'locked'}" ${click}>
      <div class="l-num">${done ? '✓' : i+1}</div>
      <div class="l-info"><div class="t">${esc(l.title)} ${src}${docLink}</div>
        <div class="m">${done ? 'ดูจบแล้ว' : (unlocked ? 'พร้อมเรียน' : (c.locked ? 'คอร์สยังไม่ปลดล็อก' : 'ดูบทก่อนหน้าให้จบก่อน'))}</div></div>
      <div class="l-state">${state}</div></div>`;
  }).join('');
  const quizBtn = c.locked
    ? `<button class="btn block" disabled>📝 ทำแบบทดสอบ (คอร์สยังไม่ปลดล็อก)</button>`
    : watchedAll
      ? `<button class="btn block" onclick="go('quiz',{courseId:${cid}})">📝 ${attempts > 0 ? 'ทำแบบทดสอบอีกครั้ง' : 'เริ่มทำแบบทดสอบ'}</button>`
      : `<button class="btn block" disabled>📝 ทำแบบทดสอบ (ดูวิดีโอให้ครบก่อน)</button>`;
  const scoreRow = best_score !== null
    ? `<div class="meta-row"><span>คะแนนล่าสุด</span><span style="color:${best_score >= PASS_MARK ? 'var(--ok)' : 'var(--red)'}">${best_score}% ${best_score >= PASS_MARK ? '(ผ่าน)' : '(ไม่ผ่าน)'}</span></div>`
    : `<div class="meta-row"><span>คะแนน</span><span style="color:#9aa8b0">ยังไม่ได้ทำ</span></div>`;
  const pct = lessons.length ? Math.round(lessons.filter(l => l.watched).length / lessons.length * 100) : 0;
  return `<div class="page-head"><div class="crumb" onclick="go('dash')">← กลับหน้าคอร์สของฉัน</div>
    <h1>${c.icon} ${esc(c.title)}</h1><p>${esc(c.description || '')}</p></div>${lockedBanner}
    <div class="detail-grid">
      <div class="lesson-list"><div class="lh">เนื้อหาบทเรียน (${lessons.length} บท)</div>${lessonsHtml || '<div style="padding:20px;color:#9aa8b0">ยังไม่มีบทเรียน</div>'}</div>
      <div>
        <div class="sidebox" style="margin-bottom:18px"><h4>ความคืบหน้า</h4>
          <div class="progress ${pct === 100 ? 'done' : ''}" style="margin:6px 0 14px"><i style="width:${pct}%"></i></div>
          <div class="meta-row"><span>ดูวิดีโอ</span><span>${lessons.filter(l => l.watched).length}/${lessons.length} บท</span></div>
          <div class="meta-row"><span>เกณฑ์ผ่าน</span><span>${PASS_MARK}%</span></div>${scoreRow}
          <div class="meta-row"><span>ทำข้อสอบไป</span><span>${attempts} ครั้ง</span></div></div>
        <div class="sidebox"><h4>แบบทดสอบท้ายคอร์ส</h4>
          <p style="font-size:13px;color:#7c8b94;margin-bottom:14px">${quiz_count} ข้อ · ต้องดูวิดีโอครบทุกบทจึงจะทำได้</p>${quizBtn}</div>
      </div></div>`;
}

/* ---------- Player ---------- */
let currentPlayerLesson = null;
async function viewPlayer(cid, lessonId){
  const { course: c, lessons } = await api('course_detail.php?id=' + cid);
  if (c.locked) throw new Redirect('course', { courseId: cid });
  const idx = lessons.findIndex(l => l.id === lessonId);
  if (idx === -1) throw new Redirect('course', { courseId: cid });
  const l = lessons[idx];
  currentPlayerLesson = { id: l.id, drive_doc_id: l.drive_doc_id, drive_video_id: l.drive_video_id };
  const already = l.watched;
  const finBlock = `<div class="finished-ov${already ? '' : ' hidden'}" id="finOv"><div class="big">✓</div><h3>ดูจบแล้ว!</h3>
      <p style="opacity:.8">คุณทำเครื่องหมายว่าดูบทเรียนนี้จบแล้ว</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
        ${l.drive_video_id ? `<button class="btn ghost" style="color:#fff;border-color:rgba(255,255,255,.4)" onclick="rewatchVideo()">🔁 ดูวิดีโอซ้ำ</button>` : ''}
        ${idx < lessons.length-1
          ? `<button class="btn" onclick="go('player',{courseId:${cid},lessonId:${lessons[idx+1].id}})">บทถัดไป →</button>`
          : `<button class="btn" onclick="afterLastLesson(${cid})">ไปทำแบบทดสอบ 📝</button>`}
        <button class="btn ghost" style="color:#fff;border-color:rgba(255,255,255,.4)" onclick="go('course',{courseId:${cid}})">กลับหน้าคอร์ส</button></div></div>`;
  const screen = l.drive_video_id
    ? `<div class="vid-frame"><iframe id="driveFrame" src="${driveEmbedSrc(l.drive_video_id)}" allow="autoplay" allowfullscreen></iframe>${finBlock}</div>`
    : `<div class="novideo" id="screen"><div class="vtitle">${esc(c.title)}</div>
         <img src="logo.png" class="mascot-still" alt=""><p class="msg">ยังไม่ได้ผูกวิดีโอ Google Drive สำหรับบทนี้<br><small>แอดมินเพิ่มลิงก์วิดีโอได้ที่เมนู "จัดการคอร์ส"</small></p>${finBlock}</div>`;
  const markBtn = already
    ? `<button class="btn ghost block" disabled>✓ ทำเครื่องหมายว่าดูจบแล้ว</button>`
    : `<button class="btn block" onclick="markWatched(${l.id})">✓ ทำเครื่องหมายว่าดูจบแล้ว</button>`;
  const docBoxInner = already
    ? `<button class="btn block" onclick="downloadDoc(${l.id},'${l.drive_doc_id}')">⬇ ดาวน์โหลดเอกสาร</button>`
    : `<button class="btn ghost block" disabled>🔒 ดูวิดีโอให้จบก่อนเพื่อดาวน์โหลดเอกสาร</button>`;
  const docBox = l.drive_doc_id ? `<div class="sidebox" style="margin-top:18px" id="docBox"><h4>📄 เอกสารประกอบการเรียน</h4>${docBoxInner}</div>` : '';
  return `<div class="page-head"><div class="crumb" onclick="go('course',{courseId:${cid}})">← ${esc(c.title)}</div>
    <h1 style="font-size:24px">${esc(l.title)}</h1><p>บทที่ ${idx+1} จาก ${lessons.length}</p></div>
    <div class="detail-grid">
      <div class="player-wrap">${screen}
        <div class="controls">
          <div id="markBtnWrap">${markBtn}</div>
          <div class="speed-note">${l.drive_video_id ? '▶ วิดีโอฝังจาก Google Drive — เมื่อดูจบแล้วให้กดปุ่มด้านบนเพื่อปลดล็อกบทถัดไป' : '⚠️ บทนี้ยังไม่ผูกวิดีโอ Google Drive — แอดมินเพิ่มลิงก์ได้ที่เมนูจัดการคอร์ส'}</div>
        </div></div>
      <div><div class="sidebox"><h4>บทเรียนในคอร์สนี้</h4>
        ${lessons.map((ll, i) => {

        }).join('')}
      </div>${docBox}</div></div>`;
}
async function markWatched(lessonId){
  try {
    await api('lesson_mark_watched.php', { method: 'POST', body: { lesson_id: lessonId } });
    showFinished();
    const mb = document.getElementById('markBtnWrap');
    if (mb) mb.innerHTML = '<button class="btn ghost block" disabled>✓ ทำเครื่องหมายว่าดูจบแล้ว</button>';

let quizState = { cid: null, questions: [], answers: {}, submitted: false };
async function viewQuiz(cid){
  let data;
  try {
    data = await api('quiz_get.php?course_id=' + cid);
  } catch (e) {
    toast(e.message || 'ไม่สามารถเปิดแบบทดสอบได้');
    throw new Redirect('course', { courseId: cid });
  }
  quizState = { cid, questions: data.questions, answers: {}, submitted: false };
  return `<div class="quiz-card"><div class="quiz-head"><h2>📝 แบบทดสอบ: ${esc(data.course_title)}</h2>
    <p>${data.questions.length} ข้อ · เกณฑ์ผ่าน ${data.pass_mark}% · เลือกคำตอบที่ถูกต้องที่สุด</p></div>
    <div class="quiz-body" id="quizBody">${data.questions.map((q,qi) => `<div class="q" id="q${qi}"><div class="qn"><b>${qi+1}.</b>${esc(q.question)}</div>
      ${q.options.map((o,oi) => `<div class="opt" data-qid="${q.id}" data-o="${oi}" onclick="pickOpt(${q.id},${oi})"><div class="mk"></div><div>${esc(o)}</div></div>`).join('')}</div>`).join('')}</div>
    <div class="quiz-foot"><span class="pct" id="qprog">ตอบแล้ว 0/${data.questions.length} ข้อ</span>
      <button class="btn ghost" onclick="go('course',{courseId:${cid}})">ยกเลิก</button>
      <button class="btn" id="submitBtn" onclick="submitQuiz()" disabled>ส่งคำตอบ</button></div></div>`;
}
function pickOpt(qid, oi){
  if (quizState.submitted) return;
  quizState.answers[qid] = oi;
  document.querySelectorAll(`.opt[data-qid="${qid}"]`).forEach(el => el.classList.toggle('sel', +el.dataset.o === oi));
  const ans = Object.keys(quizState.answers).length, total = quizState.questions.length;
  document.getElementById('qprog').textContent = `ตอบแล้ว ${ans}/${total} ข้อ`;
  document.getElementById('submitBtn').disabled = ans < total;
}
let lastResult = null;
async function submitQuiz(){
  try {
    const res = await api('quiz_submit.php', { method: 'POST', body: { course_id: quizState.cid, answers: quizState.answers } });
    quizState.submitted = true;
    res.details.forEach(d => {
      document.querySelectorAll(`.opt[data-qid="${d.question_id}"]`).forEach(el => {
        const oi = +el.dataset.o; el.style.pointerEvents = 'none';
        if (oi === d.correct_index) el.classList.add('correct');
        else if (oi === d.given) el.classList.add('wrong');
      });
    });
    document.getElementById('submitBtn').outerHTML = `<button class="btn navy" onclick="go('result',{courseId:${quizState.cid}})">ดูผลคะแนน →</button>`;
    document.getElementById('qprog').textContent = `ได้ ${res.correct}/${res.total} ข้อ (${res.score}%)`;
    lastResult = { courseId: quizState.cid, ...res };
    toast(`บันทึกคะแนน ${res.score}% เรียบร้อย`, true);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch (e) { toast(e.message || 'ส่งคำตอบไม่สำเร็จ'); }
}
function viewResult(cid){
  if (!lastResult || lastResult.courseId !== cid) throw new Redirect('course', { courseId: cid });
  const { score, passed } = lastResult;
  const col = passed ? 'var(--ok)' : 'var(--red)';
  return `<div class="result-card"><div class="result-ring" style="background:conic-gradient(${col} ${score}%, #eef2f5 0)">
      <div class="inner"><b style="color:${col}">${score}%</b><span>คะแนน</span></div></div>

async function saveCourse(){
  const deptId = +(document.getElementById('ncDept').value || 0);
  const title = document.getElementById('ncTitle').value.trim();
  const level = document.getElementById('ncLevel').value.trim();
  const icon = document.getElementById('ncIcon').value.trim() || '🎓';
  const desc = document.getElementById('ncDesc').value.trim();
  const published = document.getElementById('ncPublished').checked;
  const lessons = draftLessons.filter(l => l.title.trim()).map(l => ({ id: l.id || undefined, title: l.title.trim(), driveId: l.driveId.trim(), docId: l.docId.trim() }));

  try {

/* ---------- Admin: จัดการแบบทดสอบท้ายคอร์ส ---------- */
let draftQuiz = [];
let quizEditCourseId = null;
async function viewQuizEdit(cid){
  const { course_title, questions } = await api('quiz_questions_list.php?course_id=' + cid);
  quizEditCourseId = cid;
  draftQuiz = questions.length
    ? questions.map(q => ({ question: q.question, options: [...q.options], correct_index: q.correct_index }))
    : [{ question: '', options: ['', ''], correct_index: 0 }];
  return `<div class="page-head"><div class="crumb" onclick="go('manage')">← กลับหน้าจัดการคอร์ส</div>
    <h1>📝 จัดการแบบทดสอบ: ${esc(course_title)}</h1>
    <p>ตั้งคำถาม ตัวเลือก และเลือกคำตอบที่ถูกต้อง — พนักงานต้องทำได้ ${PASS_MARK}% ขึ้นไปจึงจะผ่านคอร์สและปลดล็อก Level ถัดไป</p></div>
    <div class="panel">
      <div id="quizRows"></div>
      <button class="btn ghost sm" style="margin:4px 0 16px" onclick="addQuizQuestion()">+ เพิ่มคำถาม</button>
      <div class="help-box">แต่ละคำถามต้องมีอย่างน้อย 2 ตัวเลือก กรอกให้ครบทุกช่อง แล้วเลือกวงกลมหน้าตัวเลือกที่ถูกต้อง 1 ข้อ · บันทึกแล้วจะแทนที่ชุดคำถามเดิมของคอร์สนี้ทั้งหมด (ไม่กระทบคะแนนที่พนักงานเคยทำไปแล้ว)</div>
      <div style="display:flex;gap:12px">
        <button class="btn" onclick="saveQuiz()">บันทึกแบบทดสอบ</button>
        <button class="btn ghost" onclick="go('manage')">ยกเลิก</button>
      </div>
    </div>`;
}
function renderQuizQuestions(){
  const el = document.getElementById('quizRows'); if (!el) return;
  el.innerHTML = draftQuiz.map((q, qi) => `<div class="lesson-row">
    <div class="row1"><div class="ln">${qi+1}</div>
      <input class="input" placeholder="คำถามข้อที่ ${qi+1}" value="${esc(q.question)}" oninput="draftQuiz[${qi}].question=this.value">
      <button class="btn ghost sm" onclick="removeQuizQuestion(${qi})">ลบคำถาม</button></div>
    ${q.options.map((o, oi) => `<div class="row1" style="margin-bottom:6px">
      <input type="radio" name="qcorrect${qi}" ${q.correct_index === oi ? 'checked' : ''} onchange="draftQuiz[${qi}].correct_index=${oi}" style="width:18px;height:18px;flex:none;accent-color:var(--navy)">
      <input class="input" placeholder="ตัวเลือกที่ ${oi+1}" value="${esc(o)}" oninput="draftQuiz[${qi}].options[${oi}]=this.value">
      <button class="btn ghost sm" onclick="removeQuizOption(${qi},${oi})">ลบ</button></div>`).join('')}
    <button class="btn ghost sm" onclick="addQuizOption(${qi})">+ เพิ่มตัวเลือก</button>
  </div>`).join('');
}
function addQuizQuestion(){ draftQuiz.push({ question: '', options: ['', ''], correct_index: 0 }); renderQuizQuestions(); }
function removeQuizQuestion(qi){
  draftQuiz.splice(qi, 1);
  if (!draftQuiz.length) draftQuiz = [{ question: '', options: ['', ''], correct_index: 0 }];
  renderQuizQuestions();
}
function addQuizOption(qi){ draftQuiz[qi].options.push(''); renderQuizQuestions(); }
function removeQuizOption(qi, oi){
  if (draftQuiz[qi].options.length <= 2) { toast('แต่ละคำถามต้องมีอย่างน้อย 2 ตัวเลือก'); return; }
  draftQuiz[qi].options.splice(oi, 1);
  if (draftQuiz[qi].correct_index >= draftQuiz[qi].options.length || draftQuiz[qi].correct_index === oi) draftQuiz[qi].correct_index = 0;
  renderQuizQuestions();
}
async function saveQuiz(){
  for (let qi = 0; qi < draftQuiz.length; qi++) {
    const q = draftQuiz[qi];
    if (!q.question.trim()) { toast(`กรุณากรอกคำถามข้อที่ ${qi+1}`); return; }
    if (q.options.length < 2) { toast(`คำถามข้อที่ ${qi+1} ต้องมีอย่างน้อย 2 ตัวเลือก`); return; }
    if (q.options.some(o => !o.trim())) { toast(`กรุณากรอกตัวเลือกให้ครบทุกช่องในคำถามข้อที่ ${qi+1} (หรือลบช่องที่ไม่ใช้ออก)`); return; }
  }
  const questions = draftQuiz.map(q => ({ question: q.question.trim(), options: q.options.map(o => o.trim()), correct_index: q.correct_index }));
  try {
    await api('quiz_questions_save.php', { method: 'POST', body: { course_id: quizEditCourseId, questions } });
    toast('บันทึกแบบทดสอบเรียบร้อย', true);
    go('manage');
  } catch (e) { toast(e.message || 'บันทึกแบบทดสอบไม่สำเร็จ'); }
}

  const { logs } = await api('logs_list.php' + (qs.toString() ? '?' + qs.toString() : ''));
  const rows = logs.map(l => {

  }).join('');
  return `<div class="page-head"><h1>ประวัติการใช้งาน (Activity Log)</h1><p>บันทึกการเข้าสู่ระบบ การดูวิดีโอ ดาวน์โหลดเอกสาร และผลสอบของผู้ใช้ทุกคน</p></div>

        <div><label class="lab">จากวันที่</label><input class="input" id="lgFrom" type="date" value="${logFilter.date_from}"></div>

      </div>

function applyLogFilter(){
  logFilter = {
    user_id: document.getElementById('lgUser').value,
    event_type: document.getElementById('lgType').value,
    date_from: document.getElementById('lgFrom').value,
    date_to: document.getElementById('lgTo').value,
  };
  go('logs');
}

/* ---------- init: กู้ session เดิม (ถ้ามี) ตอนโหลดหน้าใหม่ ---------- */
async function init(){
  try {
    const res = await api('auth_me.php');
    if (res.user) { CURRENT = res.user; CSRF = res.csrf; startApp(); }
  } catch (e) { /* ยังไม่ได้เข้าสู่ระบบ / เชื่อมต่อไม่ได้ -> อยู่หน้า login ต่อ */ }
}
init();
</script>
