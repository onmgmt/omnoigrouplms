<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omnoi Academy — ระบบเรียนรู้ภายในองค์กร</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- Cloudflare Stream Player SDK -->
<script src="https://embed.cloudflarestream.com/embed/sdk.latest.js"></script>
<style>
:root{
  --navy:#003149;--blue:#6a9dbd;--maroon:#7a1315;--red:#ed1c24;--cream:#fff0d8;--ink:#0b2433;
  --line:#dfe7ec;--ok:#1f8a4c;--warn:#c9851a;
  --shadow:0 10px 30px rgba(0,49,73,.10);--shadow-lg:0 18px 50px rgba(0,49,73,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Sarabun',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--ink);background:var(--cream);-webkit-font-smoothing:antialiased}
h1,h2,h3,h4,h5,.font-head,.btn,.brand-name{font-family:'Prompt',sans-serif}
a{color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}
img{max-width:100%;display:block}
.hidden{display:none !important}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;border-radius:12px;font-weight:600;font-size:15px;background:var(--red);color:#fff;transition:.15s;white-space:nowrap}
.btn:hover{filter:brightness(.94);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;filter:none}
.btn.navy{background:var(--navy)}
.btn.ghost{background:transparent;color:var(--navy);border:1.5px solid var(--line)}
.btn.ghost:hover{border-color:var(--navy);filter:none}
.btn.blue{background:var(--blue);color:var(--navy)}
.btn.sm{padding:7px 14px;font-size:13px;border-radius:9px}
.btn.block{width:100%}
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at 15% 20%,rgba(106,157,189,.35),transparent 45%),radial-gradient(circle at 85% 80%,rgba(237,28,36,.18),transparent 40%),var(--navy)}
.login-card{width:100%;max-width:880px;background:#fff;border-radius:24px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;box-shadow:var(--shadow-lg)}
.login-art{background:linear-gradient(160deg,var(--navy),#012537);color:var(--cream);padding:40px 36px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.login-art .blob{position:absolute;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(106,157,189,.4),transparent 70%);bottom:-120px;right:-100px}
.login-art img{width:170px;margin:18px auto;filter:drop-shadow(0 12px 22px rgba(0,0,0,.35));position:relative}
.login-art h2{font-size:26px;line-height:1.25;font-weight:800;position:relative}
.login-art p{opacity:.85;margin-top:8px;font-size:14px;position:relative}
.login-form{padding:44px 40px;display:flex;flex-direction:column;justify-content:center}
.login-form .brand-name{color:var(--maroon);font-weight:800;letter-spacing:.5px;font-size:14px}
.login-form h1{font-size:28px;color:var(--navy);margin:4px 0 26px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--navy);margin-bottom:6px}
.field input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;font-size:15px;font-family:inherit;background:#fbfcfd;transition:.15s}
.field input:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(106,157,189,.2)}
.login-err{color:var(--red);font-size:13.5px;margin:-4px 0 12px;min-height:18px;font-weight:500}
.demo-accts{margin-top:22px;border-top:1px dashed var(--line);padding-top:16px}
.demo-accts p{font-size:12px;color:#6b7d88;margin-bottom:8px;font-weight:600}
.demo-chip{display:inline-flex;flex-direction:column;gap:1px;border:1px solid var(--line);border-radius:9px;padding:7px 11px;font-size:12px;margin:0 6px 6px 0;cursor:pointer;background:#fbfcfd;transition:.15s;line-height:1.3}
.demo-chip:hover{border-color:var(--blue);background:#fff}
.demo-chip b{font-family:'Prompt';color:var(--navy)}
.demo-chip span{color:#8a99a2}
#app{min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--navy);color:#fff;display:flex;align-items:center;gap:14px;padding:0 22px;height:64px;position:sticky;top:0;z-index:30;box-shadow:0 2px 14px rgba(0,0,0,.18)}
.topbar img.logo{height:42px}
.topbar .brand-name{font-weight:800;font-size:18px;letter-spacing:.3px}
.topbar .brand-name small{display:block;font-size:10px;font-weight:400;opacity:.7;letter-spacing:2px;font-family:'Sarabun'}
.topbar .spacer{flex:1}
.topbar .user-box{display:flex;align-items:center;gap:10px;font-size:14px}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--blue);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Prompt';font-size:16px}
.user-box .meta{line-height:1.25}
.user-box .meta b{font-weight:600}
.user-box .meta span{font-size:11.5px;opacity:.75;display:block}
.role-pill{font-size:10px;background:var(--red);padding:2px 8px;border-radius:20px;font-weight:600;font-family:'Prompt'}
.role-pill.admin{background:var(--maroon)}
main{flex:1;width:100%;max-width:1160px;margin:0 auto;padding:30px 24px 60px}
.page-head{margin-bottom:24px}
.page-head .crumb{font-size:13px;color:#7c8b94;margin-bottom:6px;cursor:pointer}
.page-head .crumb:hover{color:var(--red)}
.page-head h1{font-size:30px;color:var(--navy);font-weight:800}
.page-head p{color:#5b6c75;margin-top:5px}
.grid{display:grid;gap:20px}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-2{grid-template-columns:repeat(2,1fr)}
.cols-4{grid-template-columns:repeat(4,1fr)}
.card{background:#fff;border-radius:18px;box-shadow:var(--shadow);overflow:hidden;transition:.18s;border:1px solid #eef2f5}
.card.hover:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.course-thumb{height:128px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.course-thumb .icon{font-size:46px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.2))}
.course-thumb .tag{position:absolute;top:10px;left:10px;background:rgba(255,255,255,.92);color:var(--navy);font-size:11px;font-weight:700;font-family:'Prompt';padding:3px 10px;border-radius:20px}
.course-thumb .lessons-n{position:absolute;bottom:10px;right:10px;background:rgba(0,49,73,.78);color:#fff;font-size:11px;padding:3px 9px;border-radius:8px;font-weight:500}
.course-body{padding:16px 18px 18px}
.course-body h3{font-size:17px;color:var(--navy);font-weight:700;line-height:1.3;margin-bottom:6px}
.course-body .desc{font-size:13px;color:#6b7d88;line-height:1.5;min-height:38px}
.progress{height:8px;background:#eef2f5;border-radius:20px;overflow:hidden;margin:14px 0 6px}
.progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--navy));border-radius:20px;transition:width .4s}
.progress.done > i{background:linear-gradient(90deg,#34c46b,var(--ok))}
.course-body .prow{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#7c8b94}
.badge{font-size:11px;font-weight:700;font-family:'Prompt';padding:3px 10px;border-radius:20px}
.badge.done{background:#e3f6ea;color:var(--ok)}
.badge.prog{background:#eaf3f9;color:var(--navy)}
.badge.new{background:#fdecec;color:var(--red)}
.badge.fail{background:#fdecec;color:var(--red)}
.stat{background:#fff;border-radius:16px;padding:18px 20px;box-shadow:var(--shadow);border:1px solid #eef2f5}
.stat .lab{font-size:13px;color:#7c8b94;font-weight:600}
.stat .num{font-size:32px;font-weight:800;font-family:'Prompt';color:var(--navy);margin-top:2px}
.stat .num small{font-size:15px;color:#9aa8b0;font-weight:500}
.stat.accent{background:var(--navy);color:#fff}
.stat.accent .lab{color:rgba(255,255,255,.75)}
.stat.accent .num{color:#fff}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
.tab{padding:8px 16px;border-radius:30px;font-size:14px;font-weight:600;font-family:'Prompt';background:#fff;color:var(--navy);border:1.5px solid var(--line);transition:.15s}
.tab:hover{border-color:var(--blue)}
.tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.detail-grid{display:grid;grid-template-columns:1fr 340px;gap:26px;align-items:start}
.lesson-list{background:#fff;border-radius:16px;box-shadow:var(--shadow);overflow:hidden;border:1px solid #eef2f5}
.lesson-list .lh{padding:16px 18px;border-bottom:1px solid var(--line);font-family:'Prompt';font-weight:700;color:var(--navy)}
.lesson{display:flex;align-items:center;gap:13px;padding:14px 18px;border-bottom:1px solid #f2f5f7;transition:.12s}
.lesson:last-child{border-bottom:none}
.lesson.clickable{cursor:pointer}
.lesson.clickable:hover{background:#f7fafb}
.lesson.locked{opacity:.55;cursor:not-allowed}
.l-num{width:32px;height:32px;border-radius:50%;background:#eef2f5;color:var(--navy);flex:none;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Prompt';font-size:14px}
.lesson.done .l-num{background:var(--ok);color:#fff}
.lesson.current .l-num{background:var(--red);color:#fff}
.l-info{flex:1;min-width:0}
.l-info .t{font-weight:600;font-size:14.5px;color:var(--navy)}
.l-info .m{font-size:12px;color:#8a99a2;margin-top:1px}
.l-state{font-size:18px;flex:none}
.player-wrap{background:#fff;border-radius:16px;box-shadow:var(--shadow);overflow:hidden;border:1px solid #eef2f5}
.cf-frame{position:relative;aspect-ratio:16/9;background:#000;overflow:hidden}
.cf-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.cf-shield{position:absolute;inset:0;z-index:4}
.screen{position:relative;aspect-ratio:16/9;background:radial-gradient(circle at 50% 40%,#073a55,#001824);display:flex;align-items:center;justify-content:center;overflow:hidden}
.screen .mascot{width:150px;opacity:.95;transition:.4s}
.screen.playing .mascot{animation:bob 2.4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-12px) rotate(2deg)}}
.screen .vtitle{position:absolute;top:16px;left:18px;color:#fff;font-family:'Prompt';font-weight:600;font-size:15px;text-shadow:0 2px 8px rgba(0,0,0,.5);max-width:70%}
.demo-flag{position:absolute;top:16px;right:18px;color:#fff;font-size:11px;font-family:'Prompt';background:rgba(0,0,0,.45);padding:4px 10px;border-radius:20px}
.big-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,12,20,.35);z-index:5}
.big-play button{width:84px;height:84px;border-radius:50%;background:var(--red);color:#fff;font-size:30px;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 30px rgba(0,0,0,.4);padding-left:5px;transition:.15s}
.big-play button:hover{transform:scale(1.08)}
.finished-ov{position:absolute;inset:0;background:rgba(0,24,36,.88);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:8;text-align:center;padding:20px}
.finished-ov .big{font-size:54px}
.finished-ov h3{font-size:22px}
.controls{padding:14px 18px;background:#fff}
.seekbar{height:9px;background:#e7edf1;border-radius:20px;position:relative;overflow:hidden;cursor:not-allowed}
.seekbar > i{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--blue),var(--red));border-radius:20px;width:0}
.ctrl-row{display:flex;align-items:center;gap:14px;margin-top:12px}
.ctrl-row button.play{width:44px;height:44px;border-radius:50%;background:var(--navy);color:#fff;font-size:16px;flex:none}
.ctrl-row .time{font-size:13px;color:#5b6c75;font-variant-numeric:tabular-nums;font-weight:500}
.ctrl-row .lockmsg{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--maroon);background:#fdecec;padding:6px 12px;border-radius:20px;font-weight:600}
.speed-note{font-size:12px;color:#9aa8b0;margin-top:10px;text-align:center}
.sidebox{background:#fff;border-radius:16px;box-shadow:var(--shadow);padding:20px;border:1px solid #eef2f5}
.sidebox h4{font-family:'Prompt';color:var(--navy);font-size:16px;margin-bottom:10px}
.sidebox .meta-row{display:flex;justify-content:space-between;font-size:13.5px;padding:7px 0;border-bottom:1px solid #f2f5f7}
.sidebox .meta-row:last-of-type{border-bottom:none}
.sidebox .meta-row span:first-child{color:#7c8b94}
.sidebox .meta-row span:last-child{font-weight:600;color:var(--navy)}
.quiz-card{background:#fff;border-radius:18px;box-shadow:var(--shadow);max-width:760px;margin:0 auto;overflow:hidden;border:1px solid #eef2f5}
.quiz-head{background:var(--navy);color:#fff;padding:22px 26px}
.quiz-head h2{font-size:21px}
.quiz-head p{opacity:.8;font-size:13.5px;margin-top:3px}
.quiz-body{padding:26px}
.q{margin-bottom:24px}
.q .qn{font-weight:700;color:var(--navy);font-size:16px;margin-bottom:12px;font-family:'Prompt'}
.q .qn b{color:var(--red);margin-right:6px}
.opt{display:flex;align-items:center;gap:12px;padding:13px 16px;border:1.5px solid var(--line);border-radius:12px;margin-bottom:10px;cursor:pointer;transition:.12s;font-size:15px}
.opt:hover{border-color:var(--blue);background:#f7fafb}
.opt.sel{border-color:var(--navy);background:#eaf3f9}
.opt .mk{width:24px;height:24px;border-radius:50%;border:2px solid #c4d2da;flex:none;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff}
.opt.sel .mk{background:var(--navy);border-color:var(--navy)}
.opt.correct{border-color:var(--ok);background:#e9f7ef}
.opt.correct .mk{background:var(--ok);border-color:var(--ok)}
.opt.wrong{border-color:var(--red);background:#fdecec}
.opt.wrong .mk{background:var(--red);border-color:var(--red)}
.quiz-foot{padding:18px 26px;border-top:1px solid var(--line);display:flex;align-items:center;gap:14px}
.quiz-foot .pct{margin-right:auto;font-size:13px;color:#7c8b94}
.result-card{max-width:560px;margin:0 auto;background:#fff;border-radius:20px;box-shadow:var(--shadow-lg);text-align:center;padding:42px 36px;border:1px solid #eef2f5}
.result-ring{width:150px;height:150px;margin:0 auto 20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Prompt';position:relative}
.result-ring .inner{width:118px;height:118px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center}
.result-ring .inner b{font-size:40px;color:var(--navy);line-height:1}
.result-ring .inner span{font-size:12px;color:#8a99a2}
.result-card h2{font-size:24px;color:var(--navy)}
.result-card .sub{color:#6b7d88;margin:8px 0 24px}
.result-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.table-wrap{background:#fff;border-radius:16px;box-shadow:var(--shadow);overflow:hidden;border:1px solid #eef2f5}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:13px 18px;font-size:14px}
th{background:#f5f8fa;color:var(--navy);font-family:'Prompt';font-weight:600;font-size:13px;border-bottom:2px solid var(--line);position:sticky;top:64px}
td{border-bottom:1px solid #f2f5f7;color:#3b4a52}
tr:hover td{background:#fafcfd}
td .who{display:flex;align-items:center;gap:10px}
td .who .avatar{width:32px;height:32px;font-size:13px}
.score-pill{font-weight:700;font-family:'Prompt';font-size:13px;padding:3px 11px;border-radius:20px;display:inline-block}
.s-pass{background:#e3f6ea;color:var(--ok)}.s-fail{background:#fdecec;color:var(--red)}.s-none{background:#eef2f5;color:#9aa8b0}
.panel{background:#fff;border-radius:16px;box-shadow:var(--shadow);padding:26px;border:1px solid #eef2f5}
.panel h3{font-family:'Prompt';color:var(--navy);font-size:18px;margin-bottom:4px}
.panel .sub{color:#7c8b94;font-size:13.5px;margin-bottom:20px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-row.one{grid-template-columns:1fr}
.input{width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:11px;font-size:14.5px;font-family:inherit;background:#fbfcfd}
.input:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(106,157,189,.18)}
label.lab{display:block;font-size:13px;font-weight:600;color:var(--navy);margin-bottom:6px}
.lesson-row{display:grid;grid-template-columns:26px 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:8px}
.lesson-row .ln{width:26px;height:26px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Prompt';font-weight:700;font-size:12px}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--navy);color:#fff;padding:14px 24px;border-radius:14px;box-shadow:var(--shadow-lg);font-weight:600;z-index:100;transition:.35s;display:flex;align-items:center;gap:10px}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--ok)}
.help-box{background:#f1f7fb;border:1px solid #d6e6f0;border-radius:12px;padding:14px 16px;font-size:13px;color:#3b5a6e;margin-bottom:16px;line-height:1.6}
.help-box b{color:var(--navy)}
.up-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;margin-bottom:8px}
.up-item .ic{font-size:22px}
.up-item .t{flex:1;font-size:14px;font-weight:600;color:var(--navy)}
.up-item .t small{display:block;font-weight:400;color:#9aa8b0;font-size:12px}
.cf-tag{font-size:10px;font-weight:700;font-family:'Prompt';padding:2px 7px;border-radius:6px}
.cf-on{background:#fbe9ea;color:var(--red)}
.cf-off{background:#eef2f5;color:#9aa8b0}
@media(max-width:900px){.login-card{grid-template-columns:1fr}.login-art{display:none}.detail-grid{grid-template-columns:1fr}.cols-3,.cols-4{grid-template-columns:1fr 1fr}.cols-2{grid-template-columns:1fr}}
@media(max-width:560px){.cols-3,.cols-4,.cols-2{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}.lesson-row{grid-template-columns:1fr}main{padding:20px 16px 50px}.user-box .meta{display:none}}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<section id="login">
  <div class="login-card">
    <div class="login-art">
      <div class="blob"></div>
      <div><h2>เรียนรู้ เติบโต<br>ไปด้วยกัน</h2>
        <p>ระบบพัฒนาทักษะพนักงาน Omnoi Group ทุกสายงาน เรียนได้ทุกที่ทุกเวลา</p></div>
      <img src="logo.png" alt="Omnoi mascot">
      <p style="font-size:12px;opacity:.6">Omnoi Group · Internal Learning Platform 2026</p>
    </div>
    <div class="login-form">
      <div class="brand-name">OMNOI ACADEMY</div>
      <h1>เข้าสู่ระบบ</h1>
      <form id="loginForm" autocomplete="off">
        <div class="field"><label>ชื่อผู้ใช้ (Username)</label><input type="text" id="luser" placeholder="เช่น somchai" required></div>
        <div class="field"><label>รหัสผ่าน (Password)</label><input type="password" id="lpass" placeholder="••••••" required></div>
        <div class="login-err" id="lerr"></div>
        <button class="btn block" type="submit">เข้าสู่ระบบ</button>
      </form>
      <div class="demo-accts"><p>บัญชีทดลอง (คลิกเพื่อกรอกอัตโนมัติ)</p><div id="demoChips"></div></div>
    </div>
  </div>
</section>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <header class="topbar">
    <img src="logo.png" class="logo" alt="logo">
    <div class="brand-name">OMNOI ACADEMY<small>LEARNING SYSTEM</small></div>
    <div class="spacer"></div>
    <nav id="navLinks" style="display:flex;gap:6px"></nav>
    <div class="user-box">
      <div class="meta" style="text-align:right"><b id="ubName"></b><span id="ubTrack"></span></div>
      <div class="avatar" id="ubAvatar"></div>
      <span class="role-pill" id="ubRole"></span>

const PASS_MARK = 80;
const LS_KEY='omnoi_lms_progress_v1';
const COURSES_KEY='omnoi_lms_courses_v1';
const CFG_KEY='omnoi_lms_cfg_v1';

let COURSES, PROGRESS={}, CFG={customerCode:''};

function loadCourses(){try{COURSES=JSON.parse(localStorage.getItem(COURSES_KEY));}catch(e){} if(!COURSES||!COURSES.length)COURSES=JSON.parse(JSON.stringify(DEFAULT_COURSES));}
function saveCourses(){try{localStorage.setItem(COURSES_KEY,JSON.stringify(COURSES));}catch(e){}}
function loadCfg(){try{const c=JSON.parse(localStorage.getItem(CFG_KEY));if(c)CFG=c;}catch(e){}}
function saveCfg(){try{localStorage.setItem(CFG_KEY,JSON.stringify(CFG));}catch(e){}}
function loadProgress(){try{PROGRESS=JSON.parse(localStorage.getItem(LS_KEY))||{};}catch(e){PROGRESS={};}}
function saveProgress(){try{localStorage.setItem(LS_KEY,JSON.stringify(PROGRESS));}catch(e){}}
function seedDemoProgress(){
  if(Object.keys(PROGRESS).length)return;
  PROGRESS={
    somchai:{c1:{watched:[true,true,true],score:95,attempts:1,lastDate:'2026-06-20'},c2:{watched:[true,false],score:null,attempts:0,lastDate:'2026-06-25'}},
    nattaya:{c3:{watched:[true,true,true],score:88,attempts:2,lastDate:'2026-06-22'},c4:{watched:[true,true],score:67,attempts:1,lastDate:'2026-06-24'}},
    weera:{c5:{watched:[true,true,false],score:null,attempts:0,lastDate:'2026-06-26'}},
    ploy:{c6:{watched:[true,true],score:100,attempts:1,lastDate:'2026-06-19'}},
  };
  saveProgress();
}
function getProg(uid,cid){
  if(!PROGRESS[uid])PROGRESS[uid]={};
  const c=COURSES.find(x=>x.id===cid);
  if(!PROGRESS[uid][cid])PROGRESS[uid][cid]={watched:c.lessons.map(()=>false),score:null,attempts:0,lastDate:null};
  const w=PROGRESS[uid][cid].watched;
  while(w.length<c.lessons.length)w.push(false);
  return PROGRESS[uid][cid];
}

// Cloudflare Stream iframe src
function streamSrc(uid){
  const base = CFG.customerCode
    ? `https://customer-${CFG.customerCode}.cloudflarestream.com/${uid}/iframe`
    : `https://iframe.cloudflarestream.com/${uid}`;
  return base + '?controls=false&preload=metadata';
}

let CURRENT=null, nav={};

/* ---------- Login ---------- */
function renderDemoChips(){
  document.getElementById('demoChips').innerHTML = USERS.map(u=>{
    const t=u.role==='admin'?'แอดมิน':TRACKS[u.track].name;
    return `<div class="demo-chip" onclick="fillLogin('${u.id}','${u.pass}')"><b>${u.id}</b><span>${t} · ${u.pass}</span></div>`;
  }).join('');
}
function fillLogin(id,pass){document.getElementById('luser').value=id;document.getElementById('lpass').value=pass;document.getElementById('lerr').textContent='';}
document.getElementById('loginForm').addEventListener('submit',e=>{
  e.preventDefault();
  const id=document.getElementById('luser').value.trim().toLowerCase();
  const pass=document.getElementById('lpass').value;
  const u=USERS.find(x=>x.id===id&&x.pass===pass);
  if(!u){document.getElementById('lerr').textContent='✕ ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';return;}
  CURRENT=u;startApp();
});
function startApp(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('ubName').textContent=CURRENT.name;
  document.getElementById('ubTrack').textContent=CURRENT.role==='admin'?CURRENT.dept:TRACKS[CURRENT.track].name;
  document.getElementById('ubAvatar').textContent=CURRENT.name.charAt(0);
  const rp=document.getElementById('ubRole');
  rp.textContent=CURRENT.role==='admin'?'ADMIN':'พนักงาน';
  rp.className='role-pill'+(CURRENT.role==='admin'?' admin':'');
  buildNav();
  go(CURRENT.role==='admin'?'admin':'dash');
}
function logout(){stopPlayback();CURRENT=null;document.getElementById('app').classList.add('hidden');document.getElementById('login').classList.remove('hidden');document.getElementById('loginForm').reset();document.getElementById('lerr').textContent='';}
function buildNav(){
  const items=CURRENT.role==='admin'?[['admin','แดชบอร์ด'],['report','รายงานคะแนน'],['manage','จัดการคอร์ส']]:[['dash','คอร์สของฉัน'],['myscore','ผลการเรียน']];
  document.getElementById('navLinks').innerHTML=items.map(([s,l])=>`<button class="btn ghost sm navbtn" data-s="${s}" style="color:#fff;border-color:rgba(255,255,255,.25)" onclick="go('${s}')">${l}</button>`).join('');
}
function markNav(s){document.querySelectorAll('.navbtn').forEach(b=>{b.style.background=b.dataset.s===s?'var(--red)':'transparent';b.style.borderColor=b.dataset.s===s?'var(--red)':'rgba(255,255,255,.25)';});}

/* ---------- Router ---------- */
function go(screen,opt={}){
  stopPlayback();nav={screen,...opt};
  const v=document.getElementById('view');window.scrollTo(0,0);markNav(screen);
  if(screen==='dash')v.innerHTML=viewDash();
  else if(screen==='myscore')v.innerHTML=viewMyScore();
  else if(screen==='course')v.innerHTML=viewCourse(opt.courseId);
  else if(screen==='player'){v.innerHTML=viewPlayer(opt.courseId,opt.lessonIdx);initPlayer(opt.courseId,opt.lessonIdx);}
  else if(screen==='quiz')v.innerHTML=viewQuiz(opt.courseId);
  else if(screen==='result')v.innerHTML=viewResult(opt.courseId);
  else if(screen==='admin')v.innerHTML=viewAdmin();
  else if(screen==='report')v.innerHTML=viewReport();
  else if(screen==='manage')v.innerHTML=viewManage();
}

/* ---------- helpers ---------- */
function fmtTime(s){s=s||0;const m=Math.floor(s/60),x=Math.floor(s%60);return `${m}:${String(x).padStart(2,'0')}`;}
function courseTotalDur(c){return c.lessons.reduce((a,l)=>a+(l.dur||0),0);}
function courseProgPct(uid,c){const p=getProg(uid,c.id);return Math.round(p.watched.filter(Boolean).length/c.lessons.length*100);}
function allWatched(uid,c){return getProg(uid,c.id).watched.every(Boolean);}
function courseStatus(uid,c){const p=getProg(uid,c.id);if(p.score!==null&&p.score>=PASS_MARK)return'done';if(p.score!==null&&p.score<PASS_MARK)return'fail';if(p.watched.some(Boolean))return'prog';return'new';}
function toast(msg,ok=false){const t=document.getElementById('toast');t.innerHTML=(ok?'✓ ':'')+msg;t.className='toast show'+(ok?' ok':'');setTimeout(()=>t.className='toast',2600);}
function shade(hex,p){const n=parseInt(hex.slice(1),16);let r=(n>>16)+Math.round(255*p/100),g=((n>>8)&255)+Math.round(255*p/100),b=(n&255)+Math.round(255*p/100);r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));return'#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');}

/* ---------- Dashboard (พนักงาน) ---------- */
function viewDash(){
  const my=COURSES.filter(c=>c.track===CURRENT.track);
  const done=my.filter(c=>courseStatus(CURRENT.id,c)==='done').length;
  const inprog=my.filter(c=>['prog','fail'].includes(courseStatus(CURRENT.id,c))).length;
  const avg=(()=>{const s=my.map(c=>getProg(CURRENT.id,c.id).score).filter(x=>x!==null);return s.length?Math.round(s.reduce((a,b)=>a+b,0)/s.length):'—';})();
  return `<div class="page-head"><h1>สวัสดี, ${CURRENT.name.split(' ')[0]} 👋</h1>
    <p>หลักสูตรสำหรับสายงาน <b style="color:var(--navy)">${TRACKS[CURRENT.track].icon} ${TRACKS[CURRENT.track].name}</b> — ดูวิดีโอให้จบแล้วทำแบบทดสอบเพื่อรับคะแนน</p></div>
    <div class="grid cols-4" style="margin-bottom:28px">
      <div class="stat accent"><div class="lab">หลักสูตรทั้งหมด</div><div class="num">${my.length}</div></div>
      <div class="stat"><div class="lab">เรียนจบแล้ว</div><div class="num">${done}<small> / ${my.length}</small></div></div>
      <div class="stat"><div class="lab">กำลังเรียน</div><div class="num">${inprog}</div></div>
      <div class="stat"><div class="lab">คะแนนเฉลี่ย</div><div class="num">${avg}<small>${avg==='—'?'':' %'}</small></div></div>
    </div>
    <div class="grid cols-3">${my.map(courseCard).join('')||'<p style="color:#9aa8b0">ยังไม่มีหลักสูตรในสายงานนี้</p>'}</div>`;
}
function courseCard(c){
  const pct=courseProgPct(CURRENT.id,c),st=courseStatus(CURRENT.id,c),p=getProg(CURRENT.id,c.id);
  const badge=st==='done'?`<span class="badge done">✓ ผ่าน ${p.score}%</span>`:st==='fail'?`<span class="badge fail">ไม่ผ่าน ${p.score}%</span>`:st==='prog'?`<span class="badge prog">กำลังเรียน</span>`:`<span class="badge new">ใหม่</span>`;

function initPlayer(cid,idx){
  stopPlayback();
  const c=COURSES.find(x=>x.id===cid),l=c.lessons[idx];
  player.cid=cid;player.idx=idx;player.max=0;player.playing=false;
  document.addEventListener('visibilitychange',onVis);
  if(l.cfUid){player.mode='cf';initStreamPlayer(cid,idx);}
  else{player.mode='sim';player.dur=l.dur;player.t=0;
    const p=getProg(CURRENT.id,cid);if(p.watched[idx]){player.t=player.dur;renderSimHead();showFinished();}}
}
function onVis(){if(document.hidden&&player.playing){if(player.mode==='cf'){try{player.cf.pause();}catch(e){}}else pausePlay();}}

/* ----- Cloudflare Stream mode ----- */
function initStreamPlayer(cid,idx){
  const iframe=document.getElementById('cfFrame');if(!iframe)return;
  const p=getProg(CURRENT.id,cid);
  let tries=0;
  const boot=()=>{
    if(!window.Stream){if(++tries>60)return;return setTimeout(boot,150);}
    const cf=Stream(iframe);player.cf=cf;
    cf.addEventListener('loadedmetadata',()=>{player.dur=cf.duration||0;const d=document.getElementById('durT');if(d)d.textContent=fmtTime(player.dur);if(p.watched[idx])player.max=player.dur;});
    cf.addEventListener('play',()=>{player.playing=true;const b=document.getElementById('playBtn');if(b)b.textContent='❚❚';});
    cf.addEventListener('pause',()=>{player.playing=false;const b=document.getElementById('playBtn');if(b)b.textContent='▶';});
    cf.addEventListener('seeking',()=>{if((cf.currentTime||0)>player.max+1.5)cf.currentTime=player.max;});
    cf.addEventListener('timeupdate',()=>{
      const t=cf.currentTime||0;
      if(t>player.max+1.5){cf.currentTime=player.max;return;}  // บล็อกการกรอไปข้างหน้า
      player.max=Math.max(player.max,t);
      const pct=player.dur?player.max/player.dur*100:0;
      const sf=document.getElementById('seekFill');if(sf)sf.style.width=pct+'%';
      const ct=document.getElementById('curT');if(ct)ct.textContent=fmtTime(player.max);
      if(player.dur&&player.max>=player.dur*0.97&&!getProg(CURRENT.id,cid).watched[idx])finishLesson();
    });
    cf.addEventListener('ended',()=>finishLesson());
  };
  boot();
}

/* ----- Simulated mode ----- */
function togglePlay(){
  if(player.mode==='cf'){if(!player.cf)return;try{player.cf.paused?player.cf.play():player.cf.pause();}catch(e){}return;}
  player.playing?pausePlay():playPlay();
}
function playPlay(){
  if(player.t>=player.dur)return;player.playing=true;
  document.getElementById('bigPlay').classList.add('hidden');
  document.getElementById('screen').classList.add('playing');
  document.getElementById('playBtn').textContent='❚❚';
  const speed=Math.max(1,player.dur/12);
  player.timer=setInterval(()=>{player.t+=0.25*speed;if(player.t>=player.dur){player.t=player.dur;renderSimHead();finishLesson();}else renderSimHead();},250);
}
function pausePlay(){player.playing=false;if(player.timer){clearInterval(player.timer);player.timer=null;}document.getElementById('screen')?.classList.remove('playing');const pb=document.getElementById('playBtn');if(pb)pb.textContent='▶';const bp=document.getElementById('bigPlay');if(bp)bp.classList.remove('hidden');}
function renderSimHead(){const pct=player.t/player.dur*100;const sf=document.getElementById('seekFill');if(sf)sf.style.width=pct+'%';const ct=document.getElementById('curT');if(ct)ct.textContent=fmtTime(player.t);}

function finishLesson(){
  if(player.timer){clearInterval(player.timer);player.timer=null;}
  player.playing=false;
  const p=getProg(CURRENT.id,player.cid);
  p.watched[player.idx]=true;p.lastDate=new Date().toISOString().slice(0,10);saveProgress();
  showFinished();
  const pb=document.getElementById('playBtn');if(pb)pb.textContent='▶';
}
function showFinished(){const ov=document.getElementById('finOv');if(ov)ov.classList.remove('hidden');document.getElementById('screen')?.classList.remove('playing');const bp=document.getElementById('bigPlay');if(bp)bp.classList.add('hidden');}

let quizState={cid:null,answers:[],submitted:false};
function viewQuiz(cid){
  const c=COURSES.find(x=>x.id===cid);quizState={cid,answers:c.quiz.map(()=>null),submitted:false};
  return `<div class="quiz-card"><div class="quiz-head"><h2>📝 แบบทดสอบ: ${c.title}</h2>
    <p>${c.quiz.length} ข้อ · เกณฑ์ผ่าน ${PASS_MARK}% · เลือกคำตอบที่ถูกต้องที่สุด</p></div>
    <div class="quiz-body" id="quizBody">${c.quiz.map((q,qi)=>`<div class="q" id="q${qi}"><div class="qn"><b>${qi+1}.</b>${q.q}</div>
      ${q.opts.map((o,oi)=>`<div class="opt" data-q="${qi}" data-o="${oi}" onclick="pickOpt(${qi},${oi})"><div class="mk"></div><div>${o}</div></div>`).join('')}</div>`).join('')}</div>
    <div class="quiz-foot"><span class="pct" id="qprog">ตอบแล้ว 0/${c.quiz.length} ข้อ</span>
      <button class="btn ghost" onclick="go('course',{courseId:'${cid}'})">ยกเลิก</button>
      <button class="btn" id="submitBtn" onclick="submitQuiz()" disabled>ส่งคำตอบ</button></div></div>`;
}
function pickOpt(qi,oi){
  if(quizState.submitted)return;quizState.answers[qi]=oi;
  document.querySelectorAll(`.opt[data-q="${qi}"]`).forEach(el=>el.classList.toggle('sel',+el.dataset.o===oi));
  const ans=quizState.answers.filter(x=>x!==null).length,total=quizState.answers.length;
  document.getElementById('qprog').textContent=`ตอบแล้ว ${ans}/${total} ข้อ`;
  document.getElementById('submitBtn').disabled=ans<total;
}
function submitQuiz(){
  const c=COURSES.find(x=>x.id===quizState.cid);let correct=0;
  c.quiz.forEach((q,qi)=>{const a=quizState.answers[qi];
    document.querySelectorAll(`.opt[data-q="${qi}"]`).forEach(el=>{const oi=+el.dataset.o;el.style.pointerEvents='none';if(oi===q.answer)el.classList.add('correct');else if(oi===a)el.classList.add('wrong');});
    if(a===q.answer)correct++;});
  const score=Math.round(correct/c.quiz.length*100);quizState.submitted=true;
  const p=getProg(CURRENT.id,quizState.cid);p.attempts++;if(p.score===null||score>p.score)p.score=score;p.lastDate=new Date().toISOString().slice(0,10);saveProgress();
  document.getElementById('submitBtn').outerHTML=`<button class="btn navy" onclick="go('result',{courseId:'${quizState.cid}'})">ดูผลคะแนน →</button>`;
  document.getElementById('qprog').textContent=`ได้ ${correct}/${c.quiz.length} ข้อ (${score}%)`;
  toast(`บันทึกคะแนน ${score}% เรียบร้อย`,true);window.scrollTo({top:0,behavior:'smooth'});
}

  let rows='';
  emps.forEach(u=>{const courses=COURSES.filter(c=>c.track===u.track);
    if(!courses.length){rows+=`<tr><td><div class="who"><div class="avatar">${u.name.charAt(0)}</div><div><b style="color:var(--navy)">${u.name}</b><br><small style="color:#9aa8b0">${TRACKS[u.track].name}</small></div></div></td><td colspan="6" style="color:#9aa8b0">ยังไม่มีหลักสูตร</td></tr>`;return;}
    courses.forEach((c,i)=>{const p=getProg(u.id,c.id),pct=courseProgPct(u.id,c);
      const sc=p.score===null?`<span class="score-pill s-none">ยังไม่สอบ</span>`:`<span class="score-pill ${p.score>=PASS_MARK?'s-pass':'s-fail'}">${p.score}%</span>`;
      const status=p.score!==null&&p.score>=PASS_MARK?'✅ ผ่าน':(p.score!==null?'❌ ไม่ผ่าน':(pct>0?'⏳ กำลังเรียน':'⚪ ยังไม่เริ่ม'));
      rows+=`<tr><td>${i===0?`<div class="who"><div class="avatar">${u.name.charAt(0)}</div><div><b style="color:var(--navy)">${u.name}</b><br><small style="color:#9aa8b0">${TRACKS[u.track].name}</small></div></div>`:''}</td><td>${c.icon} ${c.title}</td><td>${pct}%</td><td>${sc}</td><td>${p.attempts}</td><td>${status}</td><td><small style="color:#9aa8b0">${p.lastDate||'—'}</small></td></tr>`;});});
  return `<div class="page-head"><h1>รายงานผลการเรียนรายบุคคล</h1><p>ติดตามความคืบหน้าและคะแนนสอบของพนักงานแต่ละคน · กรองตามสายงานได้</p></div>${tabs}
    <div class="table-wrap"><table><thead><tr><th>พนักงาน</th><th>หลักสูตร</th><th>ดูวิดีโอ</th><th>คะแนน</th><th>ครั้ง</th><th>สถานะ</th><th>ล่าสุด</th></tr></thead><tbody>${rows||'<tr><td colspan=7 style="text-align:center;color:#9aa8b0;padding:30px">ไม่มีข้อมูล</td></tr>'}</tbody></table></div>`;
}

/* ---------- Admin: manage courses + Cloudflare ---------- */
let draftLessons=[{title:'',cfUid:''}];
function viewManage(){
  return `<div class="page-head"><h1>จัดการคอร์ส & วิดีโอ Cloudflare Stream</h1><p>สร้างหลักสูตร จัดกลุ่มตามสายงาน และผูก Video UID จาก Cloudflare Stream</p></div>
  <div class="panel" style="margin-bottom:20px">
    <h3>⚙️ ตั้งค่า Cloudflare Stream</h3><p class="sub">กรอก Customer Subdomain code (ไม่บังคับ — เว้นว่างได้ ระบบจะใช้โดเมนกลางของ Cloudflare)</p>
    <div class="form-row"><div><label class="lab">Customer Subdomain code</label><input class="input" id="cfCode" placeholder="เช่น abcd1234efgh5678" value="${CFG.customerCode||''}"></div>
      <div style="display:flex;align-items:flex-end"><button class="btn" onclick="saveCfgCode()">บันทึกการตั้งค่า</button></div></div>
    <div class="help-box">หา code ได้ใน Cloudflare Dashboard → Stream → ดู URL แบบ <code>customer-<b>XXXX</b>.cloudflarestream.com</code> · ส่วน <b>Video UID</b> ของแต่ละคลิป ดูได้ในหน้ารายละเอียดวิดีโอ</div>
  </div>
  <div class="detail-grid" style="grid-template-columns:1fr 360px">
    <div class="panel"><h3>➕ สร้างคอร์สใหม่</h3><p class="sub">เพิ่มบทเรียนและวาง Video UID ของแต่ละบท</p>
      <div class="form-row one"><div><label class="lab">ชื่อหลักสูตร</label><input class="input" id="ncTitle" placeholder="เช่น เทคนิคการเจรจาต่อรอง"></div></div>
      <div class="form-row"><div><label class="lab">สายงาน (Track)</label><select class="input" id="ncTrack">${Object.entries(TRACKS).map(([k,t])=>`<option value="${k}">${t.icon} ${t.name}</option>`).join('')}</select></div>
        <div><label class="lab">ไอคอน (emoji)</label><input class="input" id="ncIcon" value="🎓"></div></div>
      <div class="form-row one"><div><label class="lab">คำอธิบายสั้น</label><input class="input" id="ncDesc" placeholder="สรุปสิ่งที่ผู้เรียนจะได้รับ"></div></div>
      <label class="lab">บทเรียน (ชื่อบท + Cloudflare Video UID)</label>
      <div id="lessonRows"></div>
      <button class="btn ghost sm" style="margin:4px 0 16px" onclick="addLessonRow()">+ เพิ่มบท</button>
      <div class="help-box">เว้น Video UID ว่างได้ → บทนั้นจะเล่นเป็น <b>โหมดสาธิต</b> จนกว่าจะใส่ UID จริง · แบบทดสอบจะถูกสร้างเป็นตัวอย่าง 2 ข้อให้แก้ไขภายหลัง</div>
      <div style="display:flex;gap:12px"><button class="btn" onclick="createCourse()">บันทึกคอร์ส</button>
        <button class="btn ghost" onclick="draftLessons=[{title:'',cfUid:''}];go('manage')">ล้างฟอร์ม</button></div>
    </div>
    <div><div class="sidebox"><h4>หลักสูตรในระบบ (${COURSES.length})</h4>
      ${Object.entries(TRACKS).map(([k,t])=>{const cs=COURSES.filter(c=>c.track===k);if(!cs.length)return'';
        return `<div style="margin:12px 0 4px;font-size:12px;font-weight:700;color:${t.color};font-family:'Prompt'">${t.icon} ${t.name}</div>
        ${cs.map(c=>{const linked=c.lessons.filter(l=>l.cfUid).length;return `<div class="up-item"><div class="ic">${c.icon}</div><div class="t">${c.title}<small>${c.lessons.length} บท · ${linked}/${c.lessons.length} ผูก Stream · ${c.quiz.length} ข้อสอบ</small></div></div>`;}).join('')}`;}).join('')}
    </div></div>
  </div>`;
}
function renderLessonRows(){
  const el=document.getElementById('lessonRows');if(!el)return;
  el.innerHTML=draftLessons.map((l,i)=>`<div class="lesson-row"><div class="ln">${i+1}</div>
    <input class="input" placeholder="ชื่อบท เช่น บทที่ ${i+1}: ..." value="${l.title.replace(/"/g,'&quot;')}" oninput="draftLessons[${i}].title=this.value">
    <input class="input" placeholder="Cloudflare Video UID (ไม่บังคับ)" value="${l.cfUid}" oninput="draftLessons[${i}].cfUid=this.value.trim()">
    <button class="btn ghost sm" onclick="draftLessons.splice(${i},1);if(!draftLessons.length)draftLessons=[{title:'',cfUid:''}];renderLessonRows()">ลบ</button></div>`).join('');
}
function addLessonRow(){draftLessons.push({title:'',cfUid:''});renderLessonRows();}
function saveCfgCode(){CFG.customerCode=document.getElementById('cfCode').value.trim();saveCfg();toast('บันทึกการตั้งค่า Cloudflare แล้ว',true);}
function createCourse(){
  const title=document.getElementById('ncTitle').value.trim();
  const track=document.getElementById('ncTrack').value;
  const icon=document.getElementById('ncIcon').value.trim()||'🎓';
  const desc=document.getElementById('ncDesc').value.trim()||'หลักสูตรใหม่';
  const lessons=draftLessons.filter(l=>l.title.trim()).map((l,i)=>({title:l.title.trim(),dur:20+i*3,cfUid:l.cfUid.trim()}));
  if(!title){toast('กรุณากรอกชื่อหลักสูตร');return;}
  if(!lessons.length){toast('กรุณาเพิ่มบทเรียนอย่างน้อย 1 บท');return;}
  const id='c'+Date.now().toString().slice(-6);
  COURSES.push({id,track,title,icon,color:TRACKS[track].color,desc,lessons,
    quiz:[{q:'ตัวอย่างคำถามที่ 1 ของหลักสูตรนี้ (แก้ไขในโค้ด/ฐานข้อมูลภายหลัง)',opts:['ตัวเลือก ก','ตัวเลือก ข (ถูก)','ตัวเลือก ค','ตัวเลือก ง'],answer:1},
          {q:'ตัวอย่างคำถามที่ 2 ของหลักสูตรนี้',opts:['ตัวเลือก ก (ถูก)','ตัวเลือก ข','ตัวเลือก ค','ตัวเลือก ง'],answer:0}]});
  saveCourses();draftLessons=[{title:'',cfUid:''}];
  toast('สร้างหลักสูตร "'+title+'" เรียบร้อย',true);go('manage');
}
function resetDemo(){
  if(!confirm('รีเซ็ตคอร์ส/คะแนน/การตั้งค่าทั้งหมดกลับเป็นค่าเริ่มต้น?'))return;
  localStorage.removeItem(LS_KEY);localStorage.removeItem(COURSES_KEY);localStorage.removeItem(CFG_KEY);
  PROGRESS={};CFG={customerCode:''};loadCourses();seedDemoProgress();
  toast('รีเซ็ตข้อมูลแล้ว',true);go('admin');
}

/* ---------- init ---------- */
loadCfg();loadCourses();loadProgress();seedDemoProgress();renderDemoChips();
// re-render lesson rows after manage view loads
const _go=go;go=function(s,o){_go(s,o);if(s==='manage')renderLessonRows();};
</script>
</body>
